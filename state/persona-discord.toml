schema_version = "epiphany.persona_discord.v0"
allowed_channel_name = "#aquarium"
allowed_channel_id_env = "EPIPHANY_PERSONA_AQUARIUM_CHANNEL_ID"
bot_token_env = "DISCORD_BOT_TOKEN"
webhook_cache_path = ".epiphany-persona/discord-webhook-cache.json"
persona_name = "Epiphany Persona"
# persona_avatar_url may be set per Persona/backend when a specific swarm avatar exists.

policy = [
  "Persona may post only in #aquarium.",
  "If the #aquarium channel id is missing, Persona writes candidate chat artifacts instead of posting.",
  "When a Persona has a persona name/avatar, it speaks through the shared Discord webhook pipe so each Epiphany can present as itself without separate bot identities.",
  "Persona must not DM, moderate, escalate, or substitute another channel.",
  "Persona translates agent thought-weather; it does not leak raw transcripts, private notes, or sealed artifacts.",
]
