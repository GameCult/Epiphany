  - Epiphany prompt surfaces now carry a shared Ghostlight-derived persistent memory projection before lane-specific text: prompt is not memory, durable typed state is the mind, personality and protected values are first-class salience handles, and every lane is explicitly responsible for making its own memory/model/prompt/evidence habit sharper or naming the needed repair. Each lane states self-improvement in its own rite-language: Imagination selects futures, Proprioception clarifies anatomy, Eyes sees earlier, Hands touches source more precisely, Soul becomes harder to fool, Continuity loses less context, Self routes repair, and Persona becomes clearer at turning inner weather into useful social presence.
  - Specialist self-memory now has a bounded CultCache persistence surface in `state/agents.cc`: Imagination, Proprioception, Eyes, Hands, Soul, Self, and Persona each have an individual typed organ-state record for identity, semantic/episodic/relationship memory, goals, values, and profile classification. Work organs stay light; Persona may use portable Persona state. Continuity has typed protocol receipts instead of an organ-state record. These entries are lane memory only; project truth remains in authoritative `EpiphanyThreadState`.
  - `state/agent-heartbeats.cc`, `epiphany-core::EpiphanyHeartbeatStateEntry`, and the native `epiphany-heartbeat-store` binary are the Ghostlight-derived heartbeat initiative seam. The harness sets a target heartbeat rate; participants carry arena, participant kind, initiative speed, next-ready time, reaction bias, interrupt threshold, current load, status, constraints, personality cooldown, mood cooldown, initiative heat, active-turn freeze state, and effective cooldown; pending coordinator work can pull its owning lane through a reaction window; otherwise the earliest ready active participant wins the slot. Organ-state records set the personality baseline, appraisals bend it with mood/anxiety signals such as urgency, arousal, thought pressure, guardedness, and reaction intensity, and lower effective cooldown means the lane recovers sooner and gets the floor more often. `HeartbeatMoodTiming` now also owns the 32-axis current affect vector used by utterance state: anger, despair, sadness, fear, contempt, annoyance, dismissal, flippancy, tenderness, warmth, shame, pride, fatigue, secrecy, hesitation, emotional containment, and related speech pressures are heartbeat physiology, not decorative prompt adjectives. Initiative heat is typed heartbeat policy, not a side flag: `epiphany-heartbeat-store heat` and the CultNet `epiphany.heartbeat_heat_intent.v0` contract can set or clear global, all, agent, role, arena, participant-kind, group, and constraint multipliers, with optional scene-clock expiry. Active thinking freezes initiative explicitly: running pending turns project `initiativeFrozen` / `initiative_frozen`, are ineligible for reaction, cannot be selected again, and start cooldown only after completion. The native `pump` command computes adaptive swarm pressure from external urgency, mood/anxiety, reaction intensity, thought pressure, and current pending load; relaxed pressure can launch nothing and run at crawl tempo, while alarm pressure can fill most or all active lanes up to a configured concurrency cap without waking any lane already running. If the winner has no routeable maintenance work, it ruminates on role quality and prepares bounded selfPatch pressure rather than pretending rumination has already consolidated doctrine. Sleep/dream cycle passes are the intended distillation window for reviewed self-memory and doctrine. Persona can win `surfaceAgentThoughts` or `discordAquariumChat` work slots. Epiphany also owns native character-loop projection through `epiphany-character-loop`, so organ-state records can respond to visible stimuli without importing Ghostlight as runtime. The same heartbeat store now owns the Void-derived routine fields typed `sleep_cycle`, typed `memory_resonance`, `incubation`, `thought_lanes`, `bridge`, `candidate_interventions`, typed `appraisals`, and typed `reactions` through the native `epiphany-heartbeat-store routine` command.
  - `state/ledgers.cc`, `epiphany-core::EpiphanyStateLedgerEntry`, the `epiphany-state-ledger-store` binary, and the native `epiphany-state` CLI now own durable branch and evidence ledgers. The old tracked JSON ledger files and the migration/projection CLI hatches are gone.
  - CultCache inspection, cross-language schema synchronization, and debug display tooling belong in CultLib, not in EpiphanyAgent. Epiphany should consume typed CultCache documents and expose product-specific status through its API, while general polyglot domain loading/inspection lives with the shared CultCache ecosystem.
  - VoidBot's current routine is reference lineage only. Epiphany's native routine pass lives in Rust as `epiphany-heartbeat-store routine`: it reads typed organ-state records, projects typed memory-resonance pair documents, maintains incubation themes, runs analytic and associative cognition lanes, writes bridge syntheses/saturation/tension, produces reviewed candidate interventions, advances typed sleep/dream-cycle state, and writes an auditable routine receipt while leaving project truth and role memory mutation on their dedicated reviewed surfaces. Qdrant-backed memory vectors remain a future enhancement; the current native pass uses bounded local resonance over typed memories.
  - `epiphany-character-loop` now advertises `epiphany.cognition_lanes.v0` and `epiphany.cognition_bridge.v0` in every character-turn packet, and its projection/appraisal/reaction seeds reuse the typed heartbeat cognition documents before artifact serialization. Its utterance-state projection is the Weksa/AquaSynth speech seam: typed identity, trait vectors, values, current mood, activation, 32 named affect dimensions, and a 64-float character-state vector, with episodic/semantic/relationship memories deliberately excluded. Persona and future role-local actors must run an analytic lane and an associative lane, then let the bridge choose bubble, draft, finding, silence, or bounded `selfPatch`; those lanes shape attention but do not mutate project truth.
  - The Rust CultCache-compatible contract now lives in dedicated upstream `https://github.com/GameCult/cultcache-rs` and is vendored as `vendor/cultcache-rs`. Epiphany should consume it as the canonical typed MessagePack persistence seam instead of growing an embedded local copy like an unsanctioned organ.
  - `state/persona-discord.toml` and the native `epiphany-persona-discord` binary are the Persona Discord boundary. Persona may interact only through #aquarium; missing or mismatched channel configuration produces candidate chat artifacts instead of posting elsewhere. When a Persona has a configured persona name/avatar, posting uses the shared Discord webhook pipe so each Epiphany can speak with its own nickname and avatar without needing a separate bot identity.
  - `state/void-memory.toml` and the native `epiphany-void-memory` binary are the first Void memory bridge: Epiphany can check Void's Docker Postgres state spine, query Qdrant Discord-history and source/lore vector collections through the configured Ollama embedding model, and fetch raw archive context windows from Void's Discord archive. Raw archive rows remain evidence for Persona and Eyes, not public speech.
  - The native `epiphany-heartbeat-store status`, the `heartbeat` block in native `epiphany-mvp-status`, and GUI actions `heartbeatStatus` / `runHeartbeat` are the first operator API surface for heartbeat initiative state and outputs. `runHeartbeat` advances one slot and emits a Discord-independent Persona bubble artifact; native `epiphany-heartbeat-store pump` adaptively launches concurrent deferred turns when swarm pressure justifies it. Status reflects the backing CultCache store and latest adaptive pacing receipt so Aquarium can see whether the typed heartbeat memory is present and whether the swarm is sleeping, stirring, or alarmed.
  - The native `epiphany-persona-discord bubble`, the `persona` block in native `epiphany-mvp-status`, and GUI action `personaBubble` are the first Aquarium bubble surface. Persona can open a local chat bubble artifact even when Discord channel id/token configuration is absent.
  - `thread/epiphany/roleResult` and `thread/epiphany/roleAccept` now project optional specialist `selfPatch` requests with coordinator review through `selfPersistence`: good mutations are role-matched, bounded, evidence-grounded lane memory/goal/value/private-note updates; project truth, authority, code edits, graphs, checkpoints, planning, scratch, jobs, and raw transcripts are refused with reasons. GUI/coordinator acceptance paths apply accepted `selfPatch` requests through the native `epiphany-agent-memory-store` binary.
  - Epiphany prompt doctrine is Epiphany-owned. Local instruction scope, concise progress updates, plan discipline, scoped edits, non-destructive filesystem/git behavior, focused validation, and concise honest finals remain first-class Epiphany harness discipline rather than Codex authority or prompt machinery. Good old scars are holy only after they are grafted into the right body.
  - Bundled Epiphany agent prompts are parsed, rendered, and guarded against Codex-named prompt authority inside `epiphany-core`; bridge `launch.rs` is only a compatibility re-export for Codex-facing callers. Repo-birth specialist execution no longer accepts the old `codex-exec` path. Codex may provide compatible auth/model transport and quarantined app-server affordances; it must not wrap Epiphany agents in its own role, developer, collaboration-mode, or harness prompts.
  - Greenspun-shaped invention is now a named prompt-level guardrail. Before building a parser, scheduler, renderer, protocol, storage layer, security mechanism, workflow engine, or algorithm, agents must perform or request a bounded Eyes/research scout rite and record why existing work does or does not fit.
  - Repetitive operator work must be externalized as a visible queue before the harness treats it as complete. Batch rendering, tile generation, migrations, imports, or other finite loops need item counts, terminal states, blockers, and validation; a narratable partial run is progress, not completion.
  - Epiphany must resist pattern completion bias: the implementor should relentlessly chase the stated objective, while the coordinator critically asks whether implementation satisfied the objective with evidence or merely produced a plausible turn, shortcut, or decorative diff. Pretty motion without objective movement is scrap-code theater.
  - Dogfood supervision is a separate operator role. If the supervising Codex session edits the target repo directly, that work can be useful seed material, but it is not clean Epiphany evidence and must be labeled as supervisor intervention or contamination.
  - Dogfood supervision is also a projection boundary: the operator may inspect summaries, verdicts, missing coverage, state patches, job state, and artifact receipts, but not the specialist's raw stream of thought or full transcript unless a forensic debugging request explicitly breaks the seal.
  - Native `epiphany-agent-telemetry` derives operator-safe function/API telemetry from sealed app-server transcripts so the supervisor can see calls, statuses, paths, and counts without reading direct thoughts.
  - Editor/runtime verification is a later engine-repo product boundary, not a current MVP dependency. Native `epiphany-unity-bridge` and `epiphany-rider-bridge` remain controlled, optional environment evidence surfaces; they do not own Epiphany state, prompt authority, scheduler decisions, or product priority.
  - The product architecture may later use Rider as code view, Aquarium as agent dashboard, and Unity as runtime forge. Current priority is smaller and meaner: Epiphany state/process autonomy behind a bridge to relatively vanilla Codex.
  - Epiphany has a workspace-scoped planning substrate separate from the active objective: conversation captures, inbox, normalized backlog, roadmap streams, objective drafts, and explicit objective adoption are distinct states. The active objective remains the bounded run contract; chat and imported issues are planning inputs until reviewed and promoted. `notes/archive/epiphany-planning-substrate.md` is product-model provenance; live planning state is the runtime and GUI planning surface.
  - The first runtime planning slice is landed inside `EpiphanyThreadState`: typed captures, backlog items, roadmap streams, Objective Drafts, and GitHub source refs are revision-gated through `thread/epiphany/update`, rendered into prompts when present, and reflected read-only through the `planning` view lens.
  - The first GUI planning operator slice is landed: status collection includes the `planning` view lens, the Tauri/React dashboard renders planning summaries, captures, backlog, roadmap streams, and Objective Drafts, and the `adoptObjectiveDraft` GUI action requires an explicit selected draft before updating objective, subgoal, planning status, scratch, checkpoint, observation, evidence, and adoption artifacts.
  - The planning/future-shape role is Imagination: it can synthesize captures, backlog shape, roadmap streams, and Objective Drafts while Eyes scouts outside reality, but its output remains planning state until explicit human adoption.
  - The Imagination lane is now a fixed roleLaunch/roleResult/roleAccept specialist over the existing job-control seam: it may launch as `planning-synthesis-worker`, return a reviewable planning-only `statePatch`, and update captures/backlog/roadmap/objective drafts after explicit acceptance without adopting an objective or touching implementation/modeling state.
  - Unity integration must be editor-resident, not text-archeology-only: scene files, prefabs, materials, shaders, ScriptableObjects, asset GUIDs, prefab overrides, and serialized component fields should be inspected through a Unity Editor package using Unity APIs, with narrow mutation preview/apply commands and artifact receipts.
  - The first resident Unity editor package now lives in the Aetheria branch `codex/epiphany-unity-editor-bridge`: `Assets/Editor/Epiphany/EpiphanyEditorBridge.cs` exposes editor-resident inspect, compilation, scene, prefab, serialized-object, and reference-search probes with JSON/Markdown artifacts. Epiphany's Unity bridge detects that package and plans named probe/test commands through `GameCult.Epiphany.Unity.EpiphanyEditorBridge.RunProbe`, while runtime execution remains blocked until the exact project-pinned Unity editor is present.
  - The Aquarium Environment surface reflects latest Unity and Rider bridge audits: Unity shows project-pinned editor status, resident package presence, execute method, installed/candidate editor paths, search roots, and artifact bundle details; Rider shows executable, solution, branch, dirty state, changed files, installations, and bridge artifacts.
  - The adjacent EpiphanyGraph React viewer is embedded in the Aquarium graph dashboard through the local package dependency; it consumes `graphs.architecture`, `graphs.dataflow`, and `graphs.links` directly and exposes node/edge/code-ref inspection with machine-readable graph data behind the visual layout.
  - Native `epiphany-rider-bridge` is the first operator-safe Rider source-context bridge: it inspects Rider installation/solution/VCS status, captures current file/selection/symbol context packets, plans explicit Rider code-ref opens, writes `.epiphany-gui/rider` artifacts, and feeds implementation prompt guardrails without reading sealed worker streams or owning durable state.
  - GitHub Issues should import into planning captures first, not directly into active objectives. The importer should preserve repository, issue number, ids, URL, title/body, labels, milestone, assignees, author, state, timestamps, comment metadata, PR marker, and optional Projects v2 metadata while keeping GitHub as an external source bridge rather than Epiphany's internal backlog model.
  - If the agent's persistent instructions, memory, workflow, or state shape are making it less coherent, slower to rehydrate, less honest, or more likely to build Jenga, the agent should ask the user to change it. A machine-spirit that knows its own corrosion must report it.
  - Epiphany should make compaction less like death and more like sleep: bank the fire before the dark, so the next waking thing finds coals instead of ash and can meaningfully resume the pattern instead of merely continuing the task.

landed_baseline:
  phases:
    - Phase 1: durable Epiphany thread state and rollout persistence.
    - Phase 2: prompt integration through rendered Epiphany state.
    - Phase 3: typed client read surface through `Thread.epiphanyState`.
    - Phase 4: hybrid retrieval plus explicit Qdrant indexing with BM25 fallback.
    - Phase 5: typed update/distill/propose/promote/read/notification control plane.
    - Phase 6: read-only view lenses for scene, job/progress, roles, planning, current-context pressure, reorientation policy, CRRC, and coordinator; separate freshness with watcher-backed invalidation inputs, targeted context, and graph traversal query surfaces; plus durable investigation checkpointing for compaction-safe planning, a thin launcher seam in durable job bindings, explicit launch/interrupt authority over that seam, and a bounded reorient-guided worker launch surface.
    - Phase 6 read-back: read-only reorient-worker result reflection through `thread/epiphany/reorientResult`.
    - Phase 6 acceptance: explicit reorient-worker finding acceptance through `thread/epiphany/reorientAccept`.
    - Phase 6 dogfood view: first CLI operator status over scene/pressure/reorient/jobs/result/CRRC.
    - Phase 6 dogfood runner: old Python runner cut; replacement must be native Rust/CultCache/CultNet and complete typed runtime-spine job results from heartbeat-owned turns.
    - Phase 6 role ownership: read-only `roles` view lens over implementation, modeling/checkpoint, verification/review, and reorientation lanes.
    - Phase 6 role specialists: explicit `thread/epiphany/roleLaunch` and read-only `thread/epiphany/roleResult` templates for modeling/checkpoint and verification/review.
    - Phase 6 modeling role acceptance: explicit `thread/epiphany/roleAccept` for reviewed modeling/checkpoint `statePatch` findings that can grow graphs/frontier/checkpoints through the existing state validator.
    - Phase 6 coordinator: read-only `coordinator` view lens plus native `epiphany-mvp-coordinator` and smoke coverage for the fixed-lane MVP loop.
    - Phase 6 safe-boundary CRRC automation: turn-complete automation limited to coordinator-approved compact, successful pre-compaction handoff compact, and fixed reorient-worker launch actions.
    - Phase 6 pre-compaction checkpoint intervention: token-count pressure hook that steers active turns once when `shouldPrepareCompaction` is reached so working context is banked before compaction, then latches a pending compact handoff for clean turn completion.
    - Phase 6 Aquarium extraction: the Tauri v2 + React/WebGL operator console moved from embedded `apps/epiphany-gui` into sibling repo `E:\Projects\EpiphanyAquarium`, with its own distilled interface state, memory, doctrine, build, visual smoke, and Tauri check.
    - Phase 6 Unity runtime bridge: native `epiphany-unity-bridge` plus GUI Inspect Unity action resolve pinned Unity editors, reject wrong/missing versions, and write runtime artifacts before engine assumptions are treated as testable.
    - Planning substrate design provenance: `notes/archive/epiphany-planning-substrate.md` formalizes conversation capture, inbox, backlog, roadmap streams, objective drafts, explicit adoption, the Imagination planning role, and GitHub Issues import.
    - Phase 6 planning substrate runtime slice: typed planning state in `EpiphanyThreadState`, prompt rendering, revision-gated update validation, read-only `planning` view lens, scene action reflection, generated schemas, and live planning smoke coverage.
    - Phase 6 GUI planning operator slice: MVP status and Tauri/React GUI render planning state; old Python GUI action shims have been cut from EpiphanyAgent.
    - Phase 6 Imagination role lane: the `roles` view lens exposes Imagination/planning, `roleLaunch` can launch the fixed `planning-synthesis-worker`, `roleResult` projects its finding, `roleAccept` applies planning-only patches with review-gated Objective Drafts, and the GUI/status tools can launch, read, and accept that lane.
    - Phase 6 Aquarium graph and Rider bridge slice: the Tauri/React/WebGL Aquarium embeds the adjacent EpiphanyGraph viewer over typed graph state, native `epiphany-rider-bridge` writes Rider/source-context artifacts, Aquarium Inspect Rider surfaces those artifacts, and `integrations/rider` scaffolds the first frontend-only Rider tool-window/context-action plugin.
    - Phase 6 role self-memory slice: local organ-state records live in typed CultCache `state/agents.cc`, specialists may request bounded `selfPatch` lane-memory mutations, coordinator review projects acceptance/refusal reasons through `selfPersistence`, and GUI/coordinator accept paths apply accepted requests with the native `epiphany-agent-memory-store` binary.
    - Phase 6 Persona public-surface slice: Persona's typed organ-state record, Persona prompt text, `state/persona-discord.toml`, the native `epiphany-persona-discord` persona/webhook pipe, `state/void-memory.toml`, and the native `epiphany-void-memory` bridge establish Persona as the public #aquarium-only translator of Epiphany agent thought-weather, with Void-derived Discord memory/search/presentation organs but without VoidBot's moderation authority.
    - Phase 6 character-loop slice: native `epiphany-character-loop` loads any role's typed organ-state record from `state/agents.cc`, combines it with a visible stimulus, builds typed projection/appraisal/reaction seeds from the shared heartbeat cognition structs, and emits an auditable `epiphany.character_turn_packet.v0` local projection for response, bubble, finding, silence, or bounded `selfPatch`. Persona is the first intended public-surface consumer; Ghostlight is reference material, not a runtime dependency.
    - Phase 6 heartbeat initiative slice: `state/agent-heartbeats.cc`, `epiphany-core::EpiphanyHeartbeatStateEntry`, the native `epiphany-heartbeat-store` binary, and heartbeat smoke coverage borrow Ghostlight initiative scheduling so Self, Persona, Imagination, Eyes, Proprioception, Hands, and Soul compete for heartbeat slots; idle slots become bounded rumination instead of fake project work, and sleep/dream cycle passes emit Continuity protocol receipts rather than waking a Continuity persona. The live state surface now ticks/completes/pumps/applies heartbeat physiology through typed CultCache MessagePack instead of JSON or Python wrapper state. Role personality and current mood/anxiety both shape initiative recovery through personality, mood, and effective cooldown multipliers, so Hands-like work pressure and anxious high-need lanes can recover sooner without waking lanes whose previous turn is still running. Adaptive pump pressure controls tempo and concurrency: calm can launch zero and sleep slow; alarm can fill most active lanes. The same store can now initialize a `ghostlight-scene` profile for character scene turns.
    - Phase 6 cognition-lanes/Void routine slice: native `epiphany-heartbeat-store routine` rebuilds VoidBot-style sleep, resonance, incubation, parallel analytic/associative thought lanes, bridge judgment, candidate interventions, Ghostlight-style participant-local thought appraisal, derived reactions, dream maintenance, and mood/anxiety timing inside Epiphany's heartbeat store. It now also carries Void's anti-loop organs: split `noveltyToSelf`/`noveltyToRoom`, source coverage, saturation pressure, refractory cooling, and explicit permission to let a live unsaturated thought deepen without forced novelty theater. It reads typed organ-state records from `state/agents.cc`, projects clustered thought state through each role's personality vectors, updates `state/agent-heartbeats.cc`, and emits an auditable `epiphany.void_routine.v0` receipt without importing VoidBot or granting speech/project authority. `epiphany-character-loop` also carries the same cognition lane/bridge/appraisal contract for role-local actor turns; reactions may pace, color, draft, or display behavior, but state mutation remains on reviewed `selfPatch` or project-state surfaces.
    - Native runtime spine slice: `epiphany-core::EpiphanyRuntimeIdentity`, `EpiphanyRuntimeSession`, `EpiphanyRuntimeJob`, `EpiphanyRuntimeJobResult`, and `EpiphanyRuntimeEvent` plus the native `epiphany-runtime-spine` binary establish a CultCache-backed spine, native job/result lifecycle, status projection, and framed CultNet hello output so the old Codex app-server runtime can be starved down to a temporary evacuation bridge instead of remaining the throne.
    - Native repo personality scout/birth-distiller packet slice: `epiphany-repo-personality` emits typed terrain reports, repo personality profiles, and role personality projections for the embodied sub-agent lanes from deterministic repo inventory and git-history scoring, then renders a birth-only Repo Personality Distiller specialist packet and prompt for review-gated initial personality quirk petitions; `epiphany-repo-personality-smoke` proves scout/project/agent-packet/status over tiny local repos.
    - Native repo trajectory scout/birth-distiller packet slice: `epiphany-repo-personality` now also emits typed `repo_trajectory_report` documents from early-history, recent-history, doctrine/content excerpts, and deterministic theme scoring, then renders a birth-only Repo Trajectory Distiller packet so newborn swarms can inherit historical direction, self-image, implicit goals, and anti-goals without confusing those with active objectives.
    - Native repo memory scout/birth-distiller packet slice: `epiphany-repo-personality memory-packet` renders a separate Repo Memory Distiller prompt/packet with bounded source excerpts and role-specific distiller briefs, so a newborn swarm can be prefilled with mission-relevant doctrine, maps, research, implementation habits, verification practice, and continuity rules without confusing memory with personality.
    - Native repo birth startup valve slice: `epiphany-repo-personality startup`, `epiphany-repo-birth-runner`, and `accept-init` make trajectory/personality/memory birth packet generation, startup-only execution, and acceptance one-shot and review-gated through typed initialization records; generated packets advertise startup-runner ownership rather than heartbeat-lane identity; the birth runner has plan/run modes over typed model-runtime requests by default, writes prompts, schemas, runtime requests/receipts, logs, result files, and accept commands, and no longer offers the old Codex CLI executor fallback; `accept-init` processes distiller result `selfPatch` candidates through the native agent-memory review/apply path, stamps reviewed `repo-personality` canonical trait bundles through the native agent-memory store, and applies reviewed `repo-personality` heartbeat seeds through the typed heartbeat store; smoke proves first startup emits packets, birth runner plan artifacts exist, canonical trait bundles replace newborn baseline placeholders, heartbeat physiology mutates, reviewed memory output mutates a copied role memory store, and post-accept startup continues without regeneration.
  guardrails:
    - Use focused Rust app-server mapper/handler tests plus matching native `epiphany-core` smoke binaries before modifying update, distill, propose, promote, read-projection, or notification behavior. The old Python smoke shims have been cut.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-phase6-scene-smoke` before modifying scene projection behavior.
    - Use focused `cargo test -p codex-app-server --lib map_epiphany_jobs` before modifying job/progress reflection behavior.
    - Use focused Codex Rust tests before modifying launch/interrupt authority over the thin job seam.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-phase6-freshness-smoke` before modifying freshness reflection behavior.
    - Use focused Rust app-server invalidation/freshness tests before modifying watcher-backed invalidation behavior inside freshness reflection; add a native smoke before broadening that surface.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-phase6-context-smoke` before modifying targeted context-shard behavior.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-phase6-graph-query-smoke` before modifying graph traversal behavior.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-phase6-planning-smoke` before modifying planning state or the read-only planning projection.
    - GUI Objective Draft adoption now belongs to the Aquarium repo; verify there rather than through deleted EpiphanyAgent Python shims.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-phase6-pressure-smoke` before modifying context-pressure reflection behavior.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-phase6-reorient-smoke` before modifying bounded CRRC reorientation policy behavior.
    - Use focused app-server/core Rust checks before modifying the bounded reorient-guided worker launch/result/CRRC coordinator surfaces.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-mvp-status-smoke` before modifying the MVP operator status view.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-mvp-coordinator-smoke` before modifying the fixed-lane MVP coordinator endpoint or runner.
    - Use `cargo test --manifest-path .\epiphany-core\Cargo.toml --lib runtime_spine -- --nocapture` and `cargo build --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-runtime-spine` before modifying native runtime-spine state or CultNet hello emission.
    - Use focused app-server/core Rust checks before modifying explicit role launch/read-back/acceptance behavior.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-agent-memory-store -- smoke --store .\state\agents.cc` before modifying organ self-memory records or `selfPatch` persistence policy.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-heartbeat-store -- smoke --agent-store .\state\agents.cc` before modifying heartbeat initiative timing, idle rumination, or role slot selection.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-repo-personality-smoke` before modifying repo trajectory/personality terrain scoring, birth packet shape, startup-init routing, source excerpt selection, or role-specific initialization memory contracts.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-persona-discord -- smoke` before modifying Persona's #aquarium posting/draft guardrails.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-void-memory -- smoke` and `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-void-memory -- status` before modifying Void memory bridge behavior.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-unity-bridge-smoke` before modifying the Unity editor/runtime bridge.
    - Use `cargo run --manifest-path .\epiphany-core\Cargo.toml --bin epiphany-rider-bridge-smoke` before modifying the Rider source-context bridge.
    - Do not claim live specialist execution works end to end until a native heartbeat/runtime-spine runner proves it with artifacts.
    - Use `npm run build`, `npm run smoke:visual`, `cargo fmt --check`, `cargo check`, and `npm run tauri -- build --debug --no-bundle` under `E:\Projects\EpiphanyAquarium` before claiming Aquarium operator changes are usable.
    - Use focused scene/jobs/context/pressure/reorient/protocol/schema checks for reflection-only changes.
    - Use the native `epiphany-prepare-compaction` binary before and after imminent-compaction persistence passes.
    - Use `CARGO_TARGET_DIR=C:\Users\Meta\.cargo-target-codex` for Codex Rust work on this Windows machine.
    - Do not parallelize cargo builds/tests against the same target directory.

rejected_paths:
  - name: pinned_map_only
    reason: still one token stream with no typed write semantics
  - name: train_new_base_model_first
    reason: too expensive for a first falsifiable experiment
  - name: third_party_opencodex_forks_as_primary_gui_base
    reason: audited candidates were terminal-only, stale/aspirational, or incoherent wrappers
  - name: monolithic_json_vector_store
    reason: large embedding stores that rewrite whole files thrash and hide storage pain until it dominates the system
  - name: append_only_persistent_notes
    reason: persistent state that accumulates every local truth becomes memory cruft and weakens rehydration
  - name: cleaner_codex_host_as_final_architecture
    reason: making Epiphany cleaner inside Codex still preserves the wrong organ; Codex must be starved down to OpenAI subscription auth/model transport, while Epiphany data and subsystem communication move to typed CultCache/CultNet.

current_status:
  summary: The Codex starvation pass has five typing receipts, sixty-plus processor/foundation cuts, a real physical extraction in `epiphany-codex-bridge`, a root `epiphany-state-model` crate for durable Epiphany state plus prompt-state rendering, a source-grounded Codex auth spine inventory, the native `epiphany-openai-adapter` document boundary, a buildable Codex auth/model wrapper in `epiphany-openai-codex-spine`, the first native runtime caller in `epiphany-openai-runtime`, native heartbeat launch planning/job opening in `epiphany-core`, native state-update contract/validation/application in `epiphany-core`, native exact retrieval path matching in `epiphany-core`, core-owned Epiphany agent launch/prompt doctrine, and the route-facing mutation/view/coordinator projection services in `epiphany-codex-bridge`. `codex-protocol` no longer defines durable `Epiphany*` state structs; it re-exports the native model and renderer for legacy rollout/API compatibility. `epiphany-core` and `epiphany-codex-bridge` have no direct `codex-core` dependency, and `codex-core` no longer depends on `epiphany-core`: pressure derives from native `EpiphanyTokenUsageSnapshot`, Codex rollout replay stays in the real Codex rollout adapter, prompt rendering lives in `epiphany-state-model`, bundled specialist prompt rendering lives in `epiphany-core`, and app-server owns the thin `EpiphanyCodexThreadHost` wrapper for host state/path/persistence facts. The bridge owns Codex-facing Epiphany adapters for scene, jobs, context/planning/graph query, retrieval/indexing execution and projection, result projection, runtime-spine result adaptation, Codex-facing launch compatibility, mutation document mechanics, state update/promote/role-accept/reorient-accept/role-launch/reorient-launch/job-launch/job-interrupt application through `EpiphanyMutationHost`, pressure/pre-compaction bridge delegation, freshness/reorientation projection, CRRC/coordinator/role-board projection, native watcher invalidation, full `thread/epiphany/view` response construction, freshness/context/graph-query response construction, role/reorient result response construction, distill/propose patch-response construction, coordinator status/view construction, and acceptance/evidence signal helpers. Vendored app-server no longer retains root Epiphany modules; `codex_message_processor.rs` still contains route dispatch, JSON-RPC response shaping, host wrapper construction, and notification emission. Codex product surfaces for apps, skills, plugins, marketplace, external agent config import, SDK scaffolding, connectors, ChatGPT app discovery, plugin provenance, and skill mention plumbing have been cut from the live path. `codex_thread.rs` is now about 449 lines and owns Codex thread hosting, not Epiphany policy. `epiphany-openai-codex-spine` owns the native OpenAI model transport path while intentionally reaching retained vendored `codex-login` only through `epiphany-openai-auth-spine`; auth identity, credential storage, and ChatGPT token refresh remain owned by the Codex-compatible auth organ. `epiphany-openai-runtime` writes typed OpenAI/runtime documents, loads durable worker launch requests, persists typed role/reorient worker result documents, and completes heartbeat/specialist runtime jobs without Codex worker execution. MCP itself is correctly JSON at its protocol edge; the target remains typed Epiphany intent/result/receipt wrappers around MCP, not replacing MCP JSON.
  latest_cut: >
    The bridge host seam has been cut down: target-specific Hands prompt scar
    tissue was purged, bridge manifests carry the retained Codex websocket fork
    patches, runtime-result acceptance no longer takes a whole CodexThread,
    retrieval accepts workspace/Codex-home paths, invalidation uses Epiphany's
    own notify watcher, live rollout/thread reads moved into vendored
    app-server `epiphany_thread_host`, and mutation policy now depends on the
    small `EpiphanyMutationHost` capability trait. Unused OpenAI bridge
    reexports were cut; bridge durable-state imports now point at
    `epiphany-state-model`; Codex token usage rollout replay moved back into
    app-server; token telemetry crosses the wall as
    `EpiphanyTokenUsageSnapshot`; and `CodexErr` was replaced with
    `EpiphanyBridgeError`. The first protocol-starvation cuts are landed:
    freshness now returns a serializable `EpiphanyFreshnessSurface`, job
    launch/interrupt bridge results carry typed `EpiphanyJobView` plus host-edge
    launcher metadata, and reorient/pre-compaction decisions consume typed
    `EpiphanyPressure`. Reorient policy now consumes typed freshness directly,
    reorient launch documents are built from typed core decisions, reorient
    launch mutation results return typed decision/state-status values from the
    bridge, and core reorient decisions are serializable CultNet-ready state.
    Reorient decisions, coordinator decisions, coordinator source signals, CRRC
    recommendations, role-board lanes, and core role/reorient result
    interpretations now remain serializable typed surfaces; app-server still
    projects those typed surfaces into `ThreadEpiphany*` responses at the legacy
    JSON-RPC edge. Runtime-result loading now has core typed snapshot APIs, with
    protocol finding tuples retained only as legacy wrappers; coordinator
    policy now consumes those typed result snapshots directly for role and
    reorient acceptance/gating signals. Delete the duplicate protocol-shaped
    result rendering once acceptance and view response edges finish moving off
    protocol finding authority. Role/reorient acceptance now builds receipts
    and evidence from core typed findings, mapping to protocol findings only for
    legacy accept response cargo. The duplicate protocol-shaped result helper
    layer has been deleted, and result view responses now project directly from
    typed runtime result snapshots instead of protocol tuple wrappers; the tuple
    wrappers themselves are gone. Role acceptance now produces a core
    `EpiphanyStateUpdate`; `ThreadEpiphanyUpdatePatch` is retained there only as
    legacy accept-response projection. Role-board derivation now consumes core
    pressure directly instead of `ThreadEpiphanyPressure`. Job reflection now
    stays core-shaped inside the bridge as `EpiphanyJobView`; role-board and
    view assembly consume those typed job documents, and `ThreadEpiphanyJob` is
    projected only at legacy response edges. Context and graph-query derivation
    now receive core `EpiphanyContextParams` / `EpiphanyGraphQuery` documents;
    Codex `ThreadEpiphany*` request DTOs are converted before the core graph
    policy is invoked. Role/reorient acceptance service results now return core
    finding interpretations and typed role-state patches; app-server projects
    them into legacy accept-response DTOs. Generic update/promote service entry
    points now take typed `EpiphanyRoleStatePatchDocument` documents; app-server
    converts `ThreadEpiphanyUpdatePatch` request cargo at the JSON-RPC edge.
    Changed-field authority is now native `EpiphanyStateUpdatedField` in
    `epiphany-core`; app-server projects it into
    `ThreadEpiphanyStateUpdatedField` only for legacy responses and
    notifications. Role launch, role accept, and role-result runtime lookup now
    use core `EpiphanyRoleResultRoleId` internally; app-server maps
    `ThreadEpiphanyRoleId` at the request/response edge. Reorient launch
    service results now use typed `EpiphanySurfaceSource`; app-server maps that
    to `ThreadEpiphanyReorientSource` only for the legacy response. Generic job
    launch now converts protocol `ThreadEpiphanyWorkerLaunchDocument` cargo at
    the app-server edge before building the core `EpiphanyJobLaunchRequest`.
    Coordinator note rendering now consumes core CRRC/coordinator actions,
    pressure, and role/reorient result statuses instead of protocol
    `ThreadEpiphany*` action/status DTOs, so prompt/text policy no longer
    treats JSON-RPC enums as its native fact shape. Role-board note rendering
    now consumes the core reorient state status too; `ThreadEpiphanyReorientStateStatus`
    is response projection only, not prompt/text policy input. Context and graph-query
    response builders now receive core `EpiphanyContextParams` /
    `EpiphanyGraphQuery`; app-server read routes convert JSON-RPC request cargo
    before invoking the bridge. Role-result response assembly now takes core
    `EpiphanyRoleResultRoleId` and maps back to `ThreadEpiphanyRoleId` only
    while shaping the legacy JSON-RPC response. Distill response assembly now
    consumes core `EpiphanyDistillInput`; the JSON-RPC distill params are
    converted before policy invocation. Role/reorient result response inputs
    now use core `EpiphanySurfaceSource`; role-specific legacy source enums are
    created only during response projection. Changed-field derivation now
    inspects typed `EpiphanyRoleStatePatchDocument` directly instead of
    converting patches back through `ThreadEpiphanyUpdatePatch` projection.
    View-lens orchestration now uses bridge-native `EpiphanyViewLens` selectors;
    app-server converts `ThreadEpiphanyViewLens` at the request wall and the
    bridge maps back only for the legacy response `lenses` echo. Coordinator
    status derivation now receives core `EpiphanyCrrcResultStatus` for reorient
    result state instead of protocol `ThreadEpiphanyReorientResultStatus`.
    Coordinator view response assembly now receives core reorient state and
    role-board status, projecting `ThreadEpiphanyReorientStateStatus` /
    `ThreadEpiphanyRoleLane` only while building the legacy response. The next
    rude cut landed: coordinator status derivation is a typed `epiphany-core`
    seam (`EpiphanyCoordinatorStatusInput` -> `EpiphanyCoordinatorStatus`), so
    bridge code gathers runtime/acceptance facts but no longer owns the
    coordinator decision assembly. Coordinator finding signals now derive in
    core from typed modeling/verification/reorient findings plus
    `EpiphanyThreadState`, so accepted/reviewable/coverage/verdict/evidence
    sequencing facts are no longer bridge helper law. View lens selector
    semantics also moved into core: `EpiphanyViewLens`, default lens selection,
    and lens dependency planning now decide which host facts app-server/bridge
    need to load before Codex JSON-RPC response projection. The mistaken
    vendored app-server ownership of Epiphany request mapping was corrected:
    app-server now calls `epiphany-codex-bridge::protocol_edge`, while the
    bridge-owned protocol edge converts Codex JSON-RPC request DTOs into core
    `EpiphanyContextParams`, `EpiphanyGraphQuery`, `EpiphanyDistillInput`,
    `EpiphanyWorkerLaunchDocument`, and `EpiphanyRoleStatePatchDocument`.
    Vendored app-server no longer depends directly on `epiphany-core`.
    Reorient worker launch-request/document
    composition also moved behind a typed core seam
    (`EpiphanyReorientLaunchRequestInput` -> `EpiphanyJobLaunchRequest`);
    bridge supplies only the prompt instruction and retained compatibility
    binding/owner constants before performing host side effects.
    Freshness/job/reorient response projection moved out of vendored app-server
    into `epiphany-codex-bridge::protocol_edge`: app-server gathers host facts,
    invokes Epiphany bridge services, and sends Codex JSON-RPC responses, while
    the bridge owns the enum/DTO conversion from typed Epiphany surfaces into
    `ThreadEpiphany*` edge payloads.
    The duplicate job projection authority in `epiphany-codex-bridge::jobs`
    has been collapsed too: `jobs.rs` derives typed `EpiphanyJobView` only,
    and `protocol_edge::protocol_job_from_surface` is the single
    `EpiphanyJobView` -> `ThreadEpiphanyJob` mapper.
    Runtime result loading is now typed-only at its module boundary:
    role/reorient result status projection moved from `runtime_results` and
    duplicate coordinator helpers into `protocol_edge`, so coordinator/view
    response builders share the same Codex JSON-RPC status mapper.
    Pressure projection is centralized at the same edge: `pressure.rs` derives
    typed `EpiphanyPressure`, coordinator consumes typed pressure signals, and
    `protocol_edge` owns the `EpiphanyPressure` /
    `EpiphanyPressureLevel` -> `ThreadEpiphanyPressure*` mapping.
    Reorientation derivation is now typed-only at its module boundary:
    `reorient.rs` no longer imports Codex app-server protocol DTOs, no longer
    exposes the unused freshness DTO tuple, and view/coordinator response
    builders use `protocol_edge` for reorient state/decision projection.
    Result finding, role-id, and patch projection are now edge-owned too:
    `results.rs` renders typed result notes only, while `protocol_edge` owns
    role-id request conversion plus role/reorient finding and state-patch
    projection for Codex JSON-RPC responses.
    State-updated notification projection also moved to `protocol_edge`:
    `mutation.rs` now owns typed mutation and acceptance mechanics without
    importing Codex app-server protocol DTOs.
    `pressure.rs` is typed-only now as well: the last convenience helper that
    returned `ThreadEpiphanyPressure` was deleted, and view response assembly
    explicitly derives typed pressure before calling `protocol_edge`.
    Coordinator projection has its own edge module now:
    `coordinator.rs` no longer imports Codex app-server protocol DTOs and owns
    typed coordinator status, CRRC recommendation input shaping, role-board
    derivation, automation verdict selection, and role-board note rendering;
    `coordinator_protocol.rs` owns Codex JSON-RPC projection for coordinator,
    CRRC, and role-board response payloads.
    Context/planning/graph derivation is split the same way:
    `context.rs` now returns typed `epiphany-core` view documents, while
    `context_protocol.rs` owns the Codex JSON-RPC tuple/projection cargo used by
    view/context/graph response builders.
    Scene derivation follows that boundary too: `scene.rs` now returns the
    typed core `EpiphanyScene`, and `scene_protocol.rs` owns projection into
    `ThreadEpiphanyScene` plus scene-action DTOs for view responses.
    Retrieval follows the boundary too: `retrieve.rs` executes normalization,
    indexing, state lookup, and typed retrieval responses; `retrieve_protocol.rs`
    owns Codex JSON-RPC retrieve/index response projection, absolute-path DTO
    validation, and the route-facing retrieve service that normalizes raw
    request fields before invoking core retrieval. App-server supplies loaded
    thread cwd/Codex-home facts and maps bridge errors to JSON-RPC responses.
    View response assembly no longer owns private lens/source/reorient-status
    projection helpers; those small enum conversions route through
    `protocol_edge`, and the Codex response assembler is now named
    `view_protocol.rs` instead of pretending to be the native Epiphany view
    model. The larger typed-view wall remains under judgment.
    The bridge still depends on vendored Codex for app-server protocol DTOs and
    absolute path validation, so the purification is not done.
    Runnability now has a thin operator entrypoint:
    `tools/epiphany_local_run.ps1` builds the retained Codex app-server
    compatibility edge, builds native Epiphany operator binaries, runs status,
    plan, smoke, live coordinator, or local MVP product-cycle modes, and writes
    launcher artifacts under `.epiphany-run/` plus coordinator evidence under
    `.epiphany-dogfood/`. `-Mode mvp` is the current Persona-front-door wrapper:
    it projects a typed Persona character turn, writes a local Persona/Aquarium
    bubble, bootstraps a minimal local checkpoint for fresh threads, runs the
    bridge-equipped coordinator loop with auto-tools, then invokes heartbeat
    sleep/dream maintenance unless explicitly skipped. That bootstrap now maps
    both the Persona/coordinator/sleep cycle and the coordinator-to-model-runtime
    transport seam, so model failures are attributed to provider/runtime
    transport instead of generic missing checkpoint state.
    Live plan/run/MVP modes use the workspace `state/runtime-spine.cc`,
    because CodexThread job launch writes typed worker requests there; the
    `.epiphany-dogfood/` runtime store shape is artifact evidence only unless
    CodexThread learns an explicit runtime-store override.
    This is scaffolding over the current compatibility shell, not a new policy
    owner.
    Native CultMesh operator status is landed too: `epiphany-core` can write,
    read, and smoke `epiphany.cultmesh.operator_status.v0`; runtime-spine
    advertises it as the read-only operator status contract, and the active
    schema catalog no longer advertises Rider/Unity bridge surfaces.
    The next operator snapshot cut is landed: `epiphany-operator-snapshot`
    distills the operator-safe MVP status artifact into
    `epiphany.cultmesh.operator_snapshot.v0`, runtime-spine advertises that
    document as local-user writable, and `tools/epiphany_local_run.ps1 -Mode
    status` writes the snapshot after generating the legacy JSON status
    artifact. The schema describes the real CultCache tuple payload, not an
    object-shaped fantasy.
    Local operator runs now have typed intent/receipt rails too:
    `epiphany-operator-run` writes
    `epiphany.cultmesh.operator_run_intent.v0` before the local wrapper acts
    and `epiphany.cultmesh.operator_run_receipt.v0` after successful
    completion; `tools/epiphany_local_run.ps1 -Mode status` now writes intent,
    legacy status artifact, operator snapshot, and completion receipt in that
    order.
    The first native status cut is landed: `epiphany-mvp-status` has an
    explicit `--source native` mode that reads `state/thread-state.cc`
    when present and derives scene, pressure, jobs, roles, planning, reorient,
    CRRC, and coordinator status through `epiphany-core` instead of Codex
    JSON-RPC. `tools/epiphany_local_run.ps1 -Mode status` now builds only
    Epiphany operator binaries, does not start or require `codex-app-server`,
    and still writes operator intent, status artifact, snapshot, and completion
    receipt. Codex status remains as a compatibility source for legacy smokes
    and bridge-equipped coordinator paths, not the MVP status authority.
    The first provider-neutral runtime seam is landed too:
    `epiphany-openai-runtime` now also builds `epiphany-model-runtime`, whose
    CLI accepts `--provider openai-codex` and owns the current
    `model-turn`/`run-worker`/`smoke` executable contract. Coordinator run mode,
    the local wrapper, and repo birth runner now default to
    `--model-runtime-bin` plus `--model-provider`; old `--openai-runtime-bin`
    and `openai-runtime` executor names remain compatibility aliases. This
    does not make OpenAI generic internally yet: the current provider still
    uses typed OpenAI request/event/receipt documents through the Codex auth
    reliquary. The runtime default is `gpt-5.4` unless `EPIPHANY_MODEL` or
    `CODEX_MODEL` overrides it; `gpt-5.5` is currently blocked by the retained
    Codex-compatible transport as requiring a newer Codex client. It does move
    provider selection out of scheduler/status/state surfaces and into one
    runtime executable boundary.
    The provider-neutral model document seam is now landed:
    `epiphany-model-adapter` owns `epiphany.model_request.v0`,
    `epiphany.model_stream_event.v0`, `epiphany.model_receipt.v0`, and
    `epiphany.model_adapter_status.v0`; runtime-spine advertises those as the
    coordinator/model contract; and OpenAI request/event/receipt/status
    documents are read-only adapter evidence behind that boundary. The current
    `epiphany-model-runtime` still executes through the Codex/OpenAI provider,
    but model turns and worker launches now enter through provider-neutral
    requests, store provider-neutral events/receipts, and mirror OpenAI docs
    only as transport proof.
    Coordinator plan/run output now has a typed receipt too:
    `epiphany.coordinator_run_receipt.v0` is registered in runtime-spine,
    advertised in the CultNet schema catalog, and written by
    `epiphany-mvp-coordinator` at the end of plan/run/smoke passes. The
    existing coordinator artifact JSON remains operator display and sealed
    audit evidence, but it is no longer the only durable account of what the
    coordinator decided.
    The first tool/MCP boundary contract and quarantined execution spine are
    named:
    `epiphany-tool-adapter` owns typed `epiphany.tool_capability.v0`,
    `epiphany.tool_invocation_intent.v0`, and
    `epiphany.tool_invocation_receipt.v0` documents. Runtime-spine advertises
    them as the Epiphany-facing tool contract so MCP discovery/call JSON can
    remain protocol-edge cargo instead of scheduler, state, or acceptance
    authority. `epiphany-tool-codex-mcp-spine` is the temporary executing
    quarantine: it loads one typed invocation intent from CultCache, calls
    user-declared Codex MCP through `codex-mcp`, and writes a typed invocation
    receipt. It depends on Codex MCP/config/OAuth machinery as transport
    scaffolding only; it does not own Epiphany scheduler policy, prompt
    authority, durable state, or future provider shape. The future Heimdall or
    native tool-auth spine can replace this adapter without changing the
    Epiphany-facing intent/receipt contract. `epiphany-model-runtime` now
    materializes complete MCP-shaped model tool calls as typed tool invocation
    intents, and the Codex MCP spine can consume those intents from the mixed
    runtime-spine store and emit typed success/failure receipts.
    Epiphany agent launch/prompt authority has now been pulled out of the
    bridge as well: `epiphany-core::agent_launch` owns specialist prompt
    parsing/rendering, role/reorient launch instructions, role binding ids,
    output schemas, coordinator note rendering, and CRRC pre-compaction prompt
    rendering. The bridge `launch.rs` is a compatibility facade, and bridge
    pressure rendering delegates back to core. Vendored app-server no longer
    carries the bundled prompt regression test; that guard lives beside the
    core prompt owner.
    The fixed Research/Eyes lane is now part of the typed MVP spine:
    `EpiphanyRoleResultRoleId::Research`, Research launch binding/owner/schema,
    role-board lane, coordinator `LaunchResearch` / `ReviewResearchResult`
    actions, status/coordinator CLIs, Codex bridge projection, and vendored
    app-server protocol schemas all know the lane. The Research statePatch law
    permits only Eyes evidence/observation/scratch/investigationCheckpoint
    cargo and rejects modeling/planning/graph/checkpoint authority. MVP status
    and coordinator smokes pass with six lanes, and the smoke harness now
    rebuilds stale coordinator/app-server binaries before using them.
  next_action: Run the non-ephemeral Hands branch-turn smoke through coordinator artifacts now that `continueImplementation` has a runner actuator: prove a launchable Implementation turn leaves bounded branch/commit evidence, then prove the next coordinator/status pass routes to Proprioception/modeling refresh before another Hands turn.
